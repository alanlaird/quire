# Copy this file to config.toml and populate.
# config.toml is gitignored.
#
# quire is intended to run on alienlord, alongside Shelfmark and CWA,
# and reach both services via loopback. That bypasses Caddy's cookie
# gate on Shelfmark and avoids a public-URL round trip for CWA.
# For local development, set up `ssh -L 8083:localhost:8083 -L
# 8084:localhost:8084 alienlord.toad.love` and keep the URLs below.

[shelfmark]
base_url = "http://localhost:8084"

[cwa]
base_url = "http://localhost:8083"
# Dedicated read-only user; not the admin.
username = "quire"
password = "REPLACE_ME"

[state]
# Where the state file lives. Created on first run.
path = "./state.sqlite"

[email]
to = "alan@laird.net"
# Transport details added in Phase 7.

# One [[sources]] block per list source. Add more as needed.
[[sources]]
name = "goodreads-choice-awards-sf"
kind = "goodreads_choice_awards"
url_template = "https://www.goodreads.com/choiceawards/best-science-fiction-books-{year}"
