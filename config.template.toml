# Copy this file to config.toml and populate.
# config.toml is gitignored.

[shelfmark]
base_url = "https://shelfmark.radi8.org"
# Value of the library_session cookie issued by library.radi8.org's auth gate.
# Stored in the alienlord ansible vault as library_cookie_token. Sent on every
# Shelfmark request to satisfy Caddy's substring cookie check.
library_cookie_token = "REPLACE_ME"

[cwa]
base_url = "https://cwa.radi8.org"
# Dedicated read-only user; not the admin.
username = "quire"
password = "REPLACE_ME"

[state]
# Where the state file lives. Created on first run.
path = "./state.sqlite"

[email]
to = "alan@laird.net"
# Transport details added in Phase 7.

# One [[sources]] block per list source. Add more as needed.
[[sources]]
name = "goodreads-choice-awards-sf"
kind = "goodreads_choice_awards"
url_template = "https://www.goodreads.com/choiceawards/best-science-fiction-books-{year}"
